name: Build & Release

on:
  push:
    tags:
      - "v*.*.*" # dispara em: git tag v1.0.0 && git push --tags
  workflow_dispatch:
    # permite correr manualmente no GitHub UI

permissions:
  contents: write # necessário para criar o Release e fazer upload dos artefactos

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # macOS — ACTIVO
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install create-dmg
        run: brew install create-dmg

      # Diz ao Wails para usar pnpm em vez de npm
      - name: Build (macOS universal)
        run: wails build -platform darwin/universal -clean -trimpath
        env:
          npm_config_yes: "true"
          GOFLAGS: "-mod=mod"

      # ── Assinar + Notarizar (descomenta quando tiveres Apple Developer account) ──
      # - name: Sign & Notarize
      #   env:
      #     APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #   run: |
      #     codesign --deep --force --verify --verbose \
      #       --sign "$APPLE_SIGNING_IDENTITY" \
      #       --options runtime \
      #       build/bin/Squashly.app
      #     xcrun notarytool submit build/bin/Squashly.app \
      #       --apple-id "$APPLE_ID" \
      #       --password "$APPLE_APP_PASSWORD" \
      #       --team-id "$APPLE_TEAM_ID" \
      #       --wait
      #     xcrun stapler staple build/bin/Squashly.app

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Squashly" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Squashly.app" 175 190 \
            --hide-extension "Squashly.app" \
            --app-drop-link 425 190 \
            "build/bin/Squashly-${{ github.ref_name }}-macos-universal.dmg" \
            "build/bin/Squashly.app"

      - name: Package zip
        run: |
          cd build/bin
          zip -r "Squashly-${{ github.ref_name }}-macos-universal.zip" Squashly.app

      - name: Upload artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: squashly-macos
          path: build/bin/
          retention-days: 7

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Squashly ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name,
            '-rc') }}
          generate_release_notes: true
          files: |
            build/bin/*.dmg
            build/bin/*.zip
